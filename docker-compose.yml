version: '3.8'

services:
  # 1. Veritabanı
  db:
    image: mysql:8.0
    container_name: gayrimenkul_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Mert5811
      MYSQL_DATABASE: homeofemlak
    ports:
      - "3307:3306"
    volumes:              
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # 2. Node.js Backend
  backend:
    build: ./Backend
    container_name: gayrimenkul_backend
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=Mert5811
      - DB_NAME=homeofemlak
      - PORT=5000
      - NODE_ENV=development
      - JWT_SECRET=homeofemlak_jwt_secret_key_2026_super_secure
      - JWT_EXPIRES_IN=24h
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_USER=sigircimert039@gmail.com
      - SMTP_PASS=wzfr lkde soze sdsv
      - FRONTEND_URL=http://localhost:3000

  # 3. Frontend (Nginx)
  frontend:
    build: ./Frontend
    container_name: gayrimenkul_frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  db_data: